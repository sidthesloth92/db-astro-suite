      <main style="font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem">
        <h1>Astrogram — Professional Astrophotography Exposure Cards</h1>
        <p>
          Astrogram is a free web tool for astrophotographers. It generates beautiful,
          Instagram-ready exposure cards from your capture session metadata — gear lists, filter
          integration times (L, Ha, OIII, SII, R, G, B), Bortle scale sky quality, telescope,
          camera, mount, and software.
        </p>
        <h2>Features</h2>
        <ul>
          <li>Exposure card generator with LRGB, Ha, OIII, SII filter integration time tracking</li>
          <li>Circular progress ring visualization per filter channel</li>
          <li>Plate solving — upload your astrophoto to solve sky coordinates (RA/Dec) via WCS</li>
          <li>Annotation overlay: Messier, NGC, IC catalog objects and Tycho-2 named stars</li>
          <li>Bortle scale sky quality gradient selector</li>
          <li>Custom accent color and background image upload</li>
          <li>High-quality JPEG export for Instagram and social media</li>
        </ul>
        <h2>Who is it for?</h2>
        <p>
          Astrophotographers who want to share their session details — equipment, exposure times,
          filters used, and sky conditions — in a visually polished format on Instagram, Reddit,
          Cloudy Nights, or any astrophotography community.
        </p>
