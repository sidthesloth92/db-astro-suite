<div class="filter-ring-container">
  <div class="progress-ring">
    <svg class="ring-svg" viewBox="0 0 52 52">
      <!-- Background circle (dim) -->
      <circle class="ring-bg" cx="26" cy="26" r="23" fill="none" stroke-width="3" />
      <!-- Progress circle (colored) -->
      <circle
        class="ring-fg"
        cx="26"
        cy="26"
        r="23"
        fill="none"
        stroke-width="3"
        stroke-linecap="round"
      />
    </svg>
    <div class="ring-content">
      <span class="ring-duration">{{ duration }}</span>
    </div>
  </div>
  <span class="filter-label">{{ name }}</span>
</div>
