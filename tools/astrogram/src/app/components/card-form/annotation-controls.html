<div class="controls-wrapper">
  <input
    type="file"
    accept="image/*"
    (change)="onImageUpload($event)"
    #fileInput
    style="display: none"
  />

  <div class="action-btns">
    <button
      class="solve-btn"
      (click)="triggerPlateSolve()"
      [disabled]="!mapData().backgroundImage || isSolving()"
    >
      @if (isSolving()) {
        <span class="spinner"></span>
        ANALYZING...
      } @else {
        🚀 ASTROSOLVE
      }
    </button>
  </div>

  @if (solveStatus()) {
    <div class="status-text">{{ solveStatus() }}</div>
  }

  @if (mapData().annotations && mapData().annotations.length > 0) {
    <div class="filter-toggles mt-4">
      <h3
        style="
          font-size: 0.7rem;
          text-transform: uppercase;
          color: var(--neon-pink);
          margin-bottom: 0.8rem;
          opacity: 0.6;
        "
      >
        Annotation Filters
      </h3>
      <div style="display: flex; flex-direction: column; gap: 0.6rem">
        <label
          style="
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.85rem;
            cursor: pointer;
          "
        >
          <input
            type="checkbox"
            [checked]="mapData().filters.showMessier"
            (change)="toggleFilter('showMessier')"
          />
          Messier Catalog
        </label>
        <label
          style="
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.85rem;
            cursor: pointer;
          "
        >
          <input
            type="checkbox"
            [checked]="mapData().filters.showNgc"
            (change)="toggleFilter('showNgc')"
          />
          NGC/IC Objects
        </label>
        <label
          style="
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.85rem;
            cursor: pointer;
          "
        >
          <input
            type="checkbox"
            [checked]="mapData().filters.showNamedStars"
            (change)="toggleFilter('showNamedStars')"
          />
          Named Stars
        </label>
      </div>
    </div>
  }
</div>
