name: test-release-deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write
  packages: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  verify:
    name: Build & Verify
    # Run on PRs, OR on pushes to main THAT ARE NOT release merges
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(main): release'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Build All Applications
        run: pnpm build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  release-please:
    name: Release Management
    needs: verify
    # Only run on main pushes THAT ARE NOT release merges
    if: |
      always() && 
      needs.verify.result == 'success' && 
      github.event_name == 'push' && 
      github.ref == 'refs/heads/main' && 
      !startsWith(github.event.head_commit.message, 'chore(main): release')
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  deploy:
    name: Deploy to GitHub Pages
    # Run ONLY on main pushes THAT ARE release merges
    if: |
      always() &&
      github.event_name == 'push' && 
      github.ref == 'refs/heads/main' && 
      startsWith(github.event.head_commit.message, 'chore(main): release')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Unified Suite
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-backend-image:
    name: Build Backend Image
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      startsWith(github.event.head_commit.message, 'chore(main): release')
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.image.outputs.name }}
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/db-astro-suite-astrosolve" >> "$GITHUB_OUTPUT"

      - name: Compute image tag from release version
        id: meta
        run: |
          version=$(python3 - <<'PY'
          import json
          with open('package.json', 'r', encoding='utf-8') as package_file:
              print(json.load(package_file)['version'])
          PY
          )
          echo "tag=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./tools/astrosolve/server
          file: ./tools/astrosolve/server/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.tag }}

  deploy-backend:
    name: Deploy Backend To Hetzner
    needs: build-backend-image
    if: |
      always() &&
      needs.build-backend-image.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      startsWith(github.event.head_commit.message, 'chore(main): release')
    runs-on: ubuntu-latest
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Trust Hetzner host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend
        run: |
          ssh "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "GHCR_USERNAME='${{ github.repository_owner }}' GHCR_TOKEN='${{ github.token }}' /opt/astrosolve/scripts/server_deploy.sh '${{ needs.build-backend-image.outputs.image_tag }}'"
